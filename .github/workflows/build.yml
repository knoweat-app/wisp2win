name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Publish
        run: dotnet publish .\src\Wisp2Win\Wisp2Win.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish
      - uses: actions/upload-artifact@v4
        with:
          name: Wisp2Win-win-x64
          path: publish
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\wisp2win.iss'
      - uses: actions/upload-artifact@v4
        with:
          name: Wisp2Win-Setup
          path: installer/output/*.exe
      - name: Ensure release exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v0.1.3 --repo knoweat-app/wisp2win `
            || gh release create v0.1.3 --repo knoweat-app/wisp2win --title "Wisp2Win v0.1.3" --notes "Bugfix release: stronger paste target activation and hotkey selection reset."
      - name: Upload installer to release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v0.1.3 installer/output/*.exe --repo knoweat-app/wisp2win --clobber
