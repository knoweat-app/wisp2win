name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Publish
        run: dotnet publish .\src\Wisp2Win\Wisp2Win.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish
      - uses: actions/upload-artifact@v4
        with:
          name: Wisp2Win-win-x64
          path: publish
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\wisp2win.iss'
      - uses: actions/upload-artifact@v4
        with:
          name: Wisp2Win-Setup
          path: installer/output/*.exe
      - name: Ensure release exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v0.3.0 --repo knoweat-app/wisp2win `
            || gh release create v0.3.0 --repo knoweat-app/wisp2win --title "Wisp2Win v0.3.0" --notes "Add initial native macOS app scaffold and shared release packaging."
      - name: Upload installer to release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v0.3.0 installer/output/*.exe --repo knoweat-app/wisp2win --clobber

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build app bundle
        run: ./macos/package_app.sh
      - uses: actions/upload-artifact@v4
        with:
          name: Wisp2Mac
          path: macos/output/Wisp2Mac-v0.3.0-macos.zip
      - name: Ensure release exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v0.3.0 --repo knoweat-app/wisp2win \
            || gh release create v0.3.0 --repo knoweat-app/wisp2win --title "Wisp2Win v0.3.0" --notes "Add initial native macOS app scaffold and shared release packaging."
      - name: Upload macOS app to release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v0.3.0 macos/output/Wisp2Mac-v0.3.0-macos.zip --repo knoweat-app/wisp2win --clobber
