name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  WISP_VERSION: 0.4.0

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Publish
        run: dotnet publish .\src\Wisp2Win\Wisp2Win.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish
      - name: Package portable app
        run: Compress-Archive -Path publish\* -DestinationPath Wisp2Win-Portable-v${env:WISP_VERSION}-win-x64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: Wisp2Win-win-x64
          path: |
            publish
            Wisp2Win-Portable-v${{ env.WISP_VERSION }}-win-x64.zip
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\wisp2win.iss'
      - uses: actions/upload-artifact@v4
        with:
          name: Wisp2Win-Setup
          path: installer/output/*.exe
      - name: Ensure release exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "v$env:WISP_VERSION" --repo knoweat-app/wisp2win `
            || gh release create "v$env:WISP_VERSION" --repo knoweat-app/wisp2win --target "$env:GITHUB_SHA" --title "Wisp2Win v$env:WISP_VERSION" --notes "Add plain imported audio transcription, TXT export, and document local diarization as experimental research."
      - name: Upload Windows assets to release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v$env:WISP_VERSION" installer/output/*.exe "Wisp2Win-Portable-v$env:WISP_VERSION-win-x64.zip" --repo knoweat-app/wisp2win --clobber

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build bundled Whisper runtime
        run: ./macos/build_whisper.sh
      - name: Build app bundle
        run: ./macos/package_app.sh
      - uses: actions/upload-artifact@v4
        with:
          name: Wisp2Mac
          path: |
            macos/output/Wisp2Mac-v${{ env.WISP_VERSION }}-macos-universal.zip
            macos/output/Wisp2Mac-v${{ env.WISP_VERSION }}-macos-universal.tar.gz
      - name: Ensure release exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v${WISP_VERSION} --repo knoweat-app/wisp2win \
            || gh release create v${WISP_VERSION} --repo knoweat-app/wisp2win --title "Wisp2Win v${WISP_VERSION}" --notes "Add plain imported audio transcription, TXT export, and document local diarization as experimental research."
      - name: Upload macOS app to release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v${WISP_VERSION} macos/output/Wisp2Mac-v${WISP_VERSION}-macos-universal.zip macos/output/Wisp2Mac-v${WISP_VERSION}-macos-universal.tar.gz --repo knoweat-app/wisp2win --clobber
